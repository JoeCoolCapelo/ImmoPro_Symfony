security:
    # https://symfony.com/doc/current/security.html#registering-the-user-hashing-passwords
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'
    # https://symfony.com/doc/current/security.html#loading-the-user-the-user-provider
    providers:
        # used to reload user from session & other features (e.g. switch_user)
        app_user_provider:
            entity:
                class: App\Entity\User
                property: email
    firewalls:
        dev:
            pattern: ^/(_(profiler|wdt)|css|images|js)/
            security: false
        main:
            lazy: true
            provider: app_user_provider
            form_login:
                login_path: app_login
                check_path: app_login
                enable_csrf: true
                username_parameter: email
                password_parameter: password
            logout:
                path: app_logout
                # where to redirect after logout
                target: app_home

    role_hierarchy:
        ROLE_SUPER_ADMIN: [ROLE_ADMIN]
        ROLE_ADMIN:       [ROLE_AGENT, ROLE_PROPRIETAIRE, ROLE_CLIENT]
        ROLE_AGENT:       [ROLE_USER]
        ROLE_PROPRIETAIRE: [ROLE_USER]
        ROLE_CLIENT:      [ROLE_USER]

    access_control:
        # Zone Admin exclusive
        - { path: ^/admin, roles: ROLE_ADMIN }

        # Zone Agent & Admin (CRM, Tâches, Dépenses, Documents)
        - { path: ^/tasks, roles: ROLE_AGENT }
        - { path: ^/documents, roles: ROLE_AGENT }
        - { path: ^/paiements, roles: ROLE_AGENT }
        - { path: ^/expenses, roles: ROLE_AGENT }

        # Création de transaction réservée aux agents
        - { path: ^/transactions/create, roles: ROLE_AGENT }

        # Création de bien réservée aux agents et admins
        - { path: ^/biens/create, roles: ROLE_AGENT }

        # Zone authentifiée
        - { path: ^/biens, roles: IS_AUTHENTICATED_REMEMBERED }
        - { path: ^/visites, roles: IS_AUTHENTICATED_REMEMBERED }
        - { path: ^/transactions, roles: IS_AUTHENTICATED_REMEMBERED }
        - { path: ^/dashboard, roles: ROLE_USER }
        - { path: ^/profile, roles: ROLE_USER }
        - { path: ^/notifications, roles: ROLE_USER }

when@test:
    security:
        password_hashers:
            # By default, password hashers are resource intensive and take time. This is
            # important to generate secure password hashes. In tests however, secure hashes
            # are not important, waste resources and increase test times. The following
            # reduces the work factor to the lowest possible values.
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: auto
                cost: 4 # Lowest possible value for bcrypt
                time_cost: 3 # Lowest possible value for argon
                memory_cost: 10 # Lowest possible value for argon
